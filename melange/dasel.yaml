package:
  name: dasel
  version: 3.3.1
  epoch: 0
  description: A CLI tool to query and modify data structures
  copyright:
    - license: MIT

environment:
  contents:
    repositories:
      - https://dl-cdn.alpinelinux.org/alpine/edge/main
      - https://dl-cdn.alpinelinux.org/alpine/edge/community
    packages:
      - alpine-baselayout
      - ca-certificates-bundle
      - go 

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/TomWright/dasel
      tag: v3.3.1

  # מקום שמור לשלב ה-patch שנוסיף בהמשך
  # - uses: patch
  #   with:
  #     patches: ../patches/cve-2026-33320.patch

  # שלב 2: קימפול הקוד והעתקתו לתיקיית היעד של החבילה
  - runs: |
      # קימפול הקובץ הבינארי
      go build -o dasel ./cmd/dasel
      
      # יצירת נתיב ההתקנה בתוך החבילה (usr/bin/)
      mkdir -p ${{targets.destdir}}/usr/bin
      
      # העתקת הקובץ הבינארי עם הרשאות ריצה
      install -m 755 dasel ${{targets.destdir}}/usr/bin/dasel