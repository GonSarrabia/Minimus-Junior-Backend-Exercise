package:
  name: dasel
  version: 3.3.1
  epoch: 1
  description: A CLI tool to query and modify data structures
  copyright:
    - license: MIT

environment:
  contents:
    repositories:
      - https://dl-cdn.alpinelinux.org/alpine/edge/main
      - https://dl-cdn.alpinelinux.org/alpine/edge/community
    packages:
      - alpine-baselayout
      - ca-certificates-bundle
      - go 
      - patch # עדיין חובה כדי ש-Melange יוכל להחיל את הפאץ'

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/TomWright/dasel
      tag: v3.3.1

  # שימוש בפאץ' המקומי שיצרת (נלקח אוטומטית מאותה תיקייה של ה-YAML)
  - uses: patch
    with:
      patches: CVE-2026-33320.patch

  # פקודת אימות: נדפיס את השינויים כדי לוודא שהפאץ' הוחל בהצלחה
  - runs: |
      echo "=== Verifying applied patch ==="
      git diff --stat

  # שלב 2: קימפול הקוד והעתקתו לתיקיית היעד של החבילה
  - runs: |
      go build -o dasel ./cmd/dasel
      mkdir -p ${{targets.destdir}}/usr/bin
      install -m 755 dasel ${{targets.destdir}}/usr/bin/dasel

test:
  environment:
    contents:
      packages:
        - dasel
  pipeline:
    - runs: |
        echo "Testing if dasel binary is runnable..."
        dasel --version